# unitree_g1__g1_29dof_with_hand — body retarget config mirrors the hand-
# tuned ``g1_29dof`` recipe (gimbal-aware ik_map, soma-retargeter weight
# schedule, shoulder smoother); hand DOFs are listed in dof_order so the
# CSV includes them, but they are NOT driven by IK targets — the hand
# joints stay at zero (rest) unless a downstream hand-pose pipeline
# writes them.
#
# Source URDF: g1_29dof_with_hand.urdf

name: unitree_g1__g1_29dof_with_hand
display_name: Unitree G1 (g1 29dof with hand)
urdf: g1_29dof_with_hand.urdf
mesh_search_paths:
- meshes
length_scale: 1.0
up_axis: Z
forward_axis: X
dof_order:
- left_hip_pitch_joint
- left_hip_roll_joint
- left_hip_yaw_joint
- left_knee_joint
- left_ankle_pitch_joint
- left_ankle_roll_joint
- right_hip_pitch_joint
- right_hip_roll_joint
- right_hip_yaw_joint
- right_knee_joint
- right_ankle_pitch_joint
- right_ankle_roll_joint
- waist_yaw_joint
- waist_roll_joint
- waist_pitch_joint
- left_shoulder_pitch_joint
- left_shoulder_roll_joint
- left_shoulder_yaw_joint
- left_elbow_joint
- left_wrist_roll_joint
- left_wrist_pitch_joint
- left_wrist_yaw_joint
- left_hand_thumb_0_joint
- left_hand_thumb_1_joint
- left_hand_thumb_2_joint
- left_hand_middle_0_joint
- left_hand_middle_1_joint
- left_hand_index_0_joint
- left_hand_index_1_joint
- right_shoulder_pitch_joint
- right_shoulder_roll_joint
- right_shoulder_yaw_joint
- right_elbow_joint
- right_wrist_roll_joint
- right_wrist_pitch_joint
- right_wrist_yaw_joint
- right_hand_thumb_0_joint
- right_hand_thumb_1_joint
- right_hand_thumb_2_joint
- right_hand_middle_0_joint
- right_hand_middle_1_joint
- right_hand_index_0_joint
- right_hand_index_1_joint

# Gimbal-aware mapping — identical to g1_29dof.  Shoulders / hips target
# the middle link of their 3-DOF gimbal (*_roll_link).  No spine (fights
# chest on the shared trunk chain) and no head.
ik_map:
  hips:           pelvis
  chest:          torso_link
  left_shoulder:  left_shoulder_roll_link
  left_elbow:     left_elbow_link
  left_wrist:     left_wrist_yaw_link
  right_shoulder: right_shoulder_roll_link
  right_elbow:    right_elbow_link
  right_wrist:    right_wrist_yaw_link
  left_hip:       left_hip_roll_link
  left_knee:      left_knee_link
  left_ankle:     left_ankle_roll_link
  right_hip:      right_hip_roll_link
  right_knee:     right_knee_link
  right_ankle:    right_ankle_roll_link

weights:
  t_weight:
    hips: 30.0
    chest: 0.7
    left_shoulder: 1.5
    left_elbow: 1.0
    left_wrist: 2.0
    right_shoulder: 1.5
    right_elbow: 1.0
    right_wrist: 2.0
    left_hip: 1.5
    left_knee: 1.0
    left_ankle: 30.0
    right_hip: 1.5
    right_knee: 1.0
    right_ankle: 30.0
  r_weight:
    hips: 2.0
    chest: 0.7
    left_shoulder: 0.15
    left_elbow: 1.0
    left_wrist: 1.2
    right_shoulder: 0.15
    right_elbow: 1.0
    right_wrist: 1.2
    left_hip: 0.15
    left_knee: 1.0
    left_ankle: 2.0
    right_hip: 0.15
    right_knee: 1.0
    right_ankle: 2.0

smooth_joint_filter_masks:
  left_shoulder_pitch_link: 0.1
  left_shoulder_roll_link: 1.0
  left_shoulder_yaw_link: 0.3
  right_shoulder_pitch_link: 0.1
  right_shoulder_roll_link: 1.0
  right_shoulder_yaw_link: 0.3

feet:
  left_contact_link: left_ankle_roll_link
  right_contact_link: right_ankle_roll_link
  ground_z: 0.0
  foot_height: 0.02
rest_offsets: {}

meta:
  auto_generated: false
