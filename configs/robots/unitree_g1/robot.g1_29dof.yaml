# unitree_g1__g1_29dof — hand-tuned to mirror upstream soma-retargeter's
# Unitree G1 recipe (``soma_to_g1_retargeter_config.json``).  The auto-
# scaffolded defaults the scaffold tool ships work as a starting point
# but don't reflect the gimbal-aware ik_map / weight schedule that
# makes retargeting converge cleanly on a 29-DOF humanoid; the values
# below are transcribed from the reference pipeline that produces the
# G1 CSVs under ``soma-retargeter/assets/motions/csv`` for LAFAN / SOMA
# datasets.
#
# Source URDF: g1_29dof.urdf
# You may edit this file freely; hhtools will NOT overwrite it.
# Run ``hhtools robot scaffold unitree_g1__g1_29dof --force`` to
# regenerate from the URDF (and lose these tweaks — commit first!).

name: unitree_g1__g1_29dof
display_name: Unitree G1 (g1 29dof)
urdf: g1_29dof.urdf
mesh_search_paths:
  - meshes
length_scale: 1.0
up_axis: Z
forward_axis: X
dof_order:
  - left_hip_pitch_joint
  - left_hip_roll_joint
  - left_hip_yaw_joint
  - left_knee_joint
  - left_ankle_pitch_joint
  - left_ankle_roll_joint
  - right_hip_pitch_joint
  - right_hip_roll_joint
  - right_hip_yaw_joint
  - right_knee_joint
  - right_ankle_pitch_joint
  - right_ankle_roll_joint
  - waist_yaw_joint
  - waist_roll_joint
  - waist_pitch_joint
  - left_shoulder_pitch_joint
  - left_shoulder_roll_joint
  - left_shoulder_yaw_joint
  - left_elbow_joint
  - left_wrist_roll_joint
  - left_wrist_pitch_joint
  - left_wrist_yaw_joint
  - right_shoulder_pitch_joint
  - right_shoulder_roll_joint
  - right_shoulder_yaw_joint
  - right_elbow_joint
  - right_wrist_roll_joint
  - right_wrist_pitch_joint
  - right_wrist_yaw_joint

# Gimbal-aware mapping.  Hips target the middle link of their 3-DOF gimbal
# (``*_roll_link``).  Shoulders use ``*_pitch_link`` (same as RP1) so
# lateral shoulder width tracks the scaled mocap target instead of
# sitting at the roll-link offset; roll/yaw stay in the smoother null
# space.  ``Spine`` is intentionally absent — G1's torso is driven by
# the ``Chest`` → ``torso_link`` target alone; adding a waist-roll
# target fights the chest target because they share the same 3-DOF
# trunk chain.
ik_map:
  hips: pelvis
  chest: torso_link
  left_shoulder: left_shoulder_pitch_link
  left_elbow: left_elbow_link
  left_wrist: left_wrist_yaw_link
  right_shoulder: right_shoulder_pitch_link
  right_elbow: right_elbow_link
  right_wrist: right_wrist_yaw_link
  left_hip: left_hip_roll_link
  left_knee: left_knee_link
  left_ankle: left_ankle_roll_link
  right_hip: right_hip_roll_link
  right_knee: right_knee_link
  right_ankle: right_ankle_roll_link

# Per-joint IK weights transcribed from upstream soma-retargeter
# ``soma_to_g1_retargeter_config.json``.  Philosophy (same as RP1):
#
#   * Strong ``t`` on anchors (hips, feet) — they pin the robot in
#     space and must not drift.
#   * Weak ``r`` on shoulders / hips (0.15) — a quaternion target
#     over-determines a 3-DOF gimbal; position drives, rotation only
#     hints, and the smoother regularises the null-space DOF.
#   * Strong ``t`` + ``r`` on distal joints (elbows, knees, wrists) —
#     these 1-DOF joints need both anchors to lock down the segment.
weights:
  t_weight:
    hips: 30.0
    chest: 0.7
    left_shoulder: 1.5
    left_elbow: 1.0
    left_wrist: 2.0
    right_shoulder: 1.5
    right_elbow: 1.0
    right_wrist: 2.0
    left_hip: 1.5
    left_knee: 1.0
    left_ankle: 30.0
    right_hip: 1.5
    right_knee: 1.0
    right_ankle: 30.0
  r_weight:
    hips: 2.0
    chest: 0.7
    left_shoulder: 0.15
    left_elbow: 1.0
    left_wrist: 1.2
    right_shoulder: 0.15
    right_elbow: 1.0
    right_wrist: 1.2
    left_hip: 0.15
    left_knee: 1.0
    left_ankle: 2.0
    right_hip: 0.15
    right_knee: 1.0
    right_ankle: 2.0

# Per-link smoother weights fed to :class:`IKSmoothJointFilter`.  G1's
# hip_yaw range is tighter than RP1's and soma-retargeter doesn't
# regularise it there; we mirror that choice.  The shoulder gimbal
# still needs regularisation or the yaw DOF drifts anywhere in its
# ±π limits.
smooth_joint_filter_masks:
  left_shoulder_pitch_link: 0.1
  left_shoulder_roll_link: 1.0
  left_shoulder_yaw_link: 0.3
  right_shoulder_pitch_link: 0.1
  right_shoulder_roll_link: 1.0
  right_shoulder_yaw_link: 0.3

feet:
  left_contact_link: left_ankle_roll_link
  right_contact_link: right_ankle_roll_link
  ground_z: 0.0
  foot_height: 0.02
rest_offsets: {}
retarget:
  # Warm-up / cool-down IK passes on the first/last target so the per-frame
  # solver enters and leaves the clip already converged (matches RP1).  Trimmed
  # from the output, purely internal.
  num_initialization_frames: 10
  num_stabilization_frames: 5
  # Post-IK foot-ground clamp (``_clamp_solved_foot_heights``) knobs:
  #   foot_clamp_max_lift_rate  — max per-frame upward root lift (m).  The lift
  #     used to be instantaneous and caused single-frame "robot jumps up/down
  #     in Z" on flips; this rate-limits it (default 0.02 ≈ 2.4 m/s) so the
  #     correction is spread over a few frames while feet stay grounded.
  #   foot_clamp_anti_penetration — set ``false`` to switch the upward lift OFF
  #     entirely (no vertical correction; feet may clip through the floor during
  #     fast / inverted motion).  Prefer the rate limiter above unless you want
  #     the raw IK root trajectory and handle grounding yourself.
  #   foot_clamp_anti_float — ``false`` disables only the *downward* float-removal.
  foot_clamp_max_lift_rate: 0.02
  foot_clamp_anti_penetration: false
  joint_scale_multipliers:
    hips: 1.0
    chest: 0.2256
    left_shoulder: 0.7483
    left_elbow: 0.8164
    left_wrist: 0.8489
    right_shoulder: 0.7482
    right_elbow: 0.8164
    right_wrist: 0.8489
    left_hip: 1.7347
    left_knee: 1.0084
    left_ankle: 0.9056
    right_hip: 1.7347
    right_knee: 1.0084
    right_ankle: 0.9056
